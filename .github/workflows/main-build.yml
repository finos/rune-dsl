name: Build main branch and upload dependency graph

on:
  push:
    branches: [ main ]

# Cancel previous jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-ts: ${{ steps.capture-ts.outputs.build_ts }}
    steps:
      - uses: actions/checkout@v6
      - name: Capture build timestamp
        id: capture-ts
        run: echo "::set-output name=build_ts::$(date +%s)"
      - name: Build with Maven
        uses: ./.github/actions/maven-build
        with:
          build-command: install

  upload-dependency-graph:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      # Upload full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
